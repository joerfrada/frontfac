<app-breadcrumb [icon]="'fa-address-book'" [title]="'Requerimientos'" [items]="'Módulo,Param,Requerimientos'"></app-breadcrumb>
<div class="app-content-inner">
    <div class="app-content-tile">
        <div class="flex-content">
            <div class="filter-content">
                <ul class="filter-inner">
                    <li class="filter-item">
                        <button type="button" class="button btn-default" (click)="openModal()">Crear</button>
                    </li>
                    <li class="filter-item">
                        <div class="input-group-btn">
                            <input type="search" placeholder="Buscar...">
                            <button type="button" class="button btn-default">
                                <i class="fa fa-search"></i>
                            </button>
                        </div>
                    </li>
                </ul>
            </div>
            <div class="table-content">
                <table class="table flex-table">
                    <thead>
                        <tr>
                            <th>Requerimiento</th>
                            <th>Categoría</th>
                            <th>Especialidad</th>
                            <th>Grado</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody class="scroll">
                        <tr *ngFor="let item of varhistorial; let i = index">
                            <td>{{item.requerimiento}}</td>
                            <td>{{item.categoria}}</td>
                            <td>{{item.especialidad}}</td>
                            <td>{{item.grado}}</td>
                            <td>
                                <i class="fa fa-1m5x fa-check-circle" *ngIf="item.activo == true"></i>
                                <i class="fa fa-1m5x fa-times-circle" *ngIf="item.activo == false"></i>
                            </td>
                            <td class="table-buttons-action">
                                <!-- <button type="button" class="button btn-icon btn-trash"><i class="fa fa-trash"></i></button>
                                <button type="button" class="button btn-icon btn-edit"><i class="fa fa-edit"></i></button>
                                <button type="button" class="button btn-icon btn-plus"><i class="fa fa-plus"></i></button> -->
                                <button type="button" class="button btn-edit">Editar</button>
                                <!-- <button type="button" class="button btn-default">Detalle</button> -->
                            </td>
                        </tr>
                        <tr *ngIf="varhistorial?.length == 0">
                            <div class="dbempty">No hay datos.</div>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination-content"></div>
        </div>
    </div>
</div>

<app-modal [title]="'Crear'" [show]="modal" [size]="'default-modal'" (close)="closeModal($event)">
    <div role="body" class="modal-body">
        <div class="inner-col">
            <div class="table-content">
                <table class="table flex-table">
                    <thead>
                        <tr>
                            <th>Requerimientos</th>
                            <th>Activo</th>
                            <th>Categoría</th>
                            <th>Especialidad</th>
                            <th>Grado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody class="scroll">
                        <tr *ngFor="let item of varhistorial;let i = index">
                            <td>
                                <input type="text">
                            </td>
                            <td>
                                <div class="table-checkbox-component">
                                    <input type="checkbox" checked="checked">
                                </div>
                            </td>
                            <td>
                                <select>
                                    <option value="0">Seleccionar</option>
                                </select>
                            </td>
                            <td>
                                <select>
                                    <option value="0">Seleccionar</option>
                                </select>
                            </td>
                            <td>
                                <select>
                                    <option value="0">Seleccionar</option>
                                </select>
                            </td>
                            <td>
                                <i class="fa fa-1m5x fa-trash"></i>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <div role="button">
        <ul class="modal-buttons">
            <li class="modal-button-item">
                <button type="button" class="btn btn-red" (click)="closeModal(false)">Cerrar</button>
            </li>
            <li class="modal-button-item">
                <button type="button" class="btn btn-blue" (click)="closeModal(false)">Guardar</button>
            </li>
        </ul>
    </div>
</app-modal>
